spring:
  application:
    name: presupuesto-dssm

  # Perfil por defecto para desarrollo rápido.
  # Opciones disponibles:
  # - local-h2: H2 en memoria para pruebas rápidas.
  # - local-mysql: MySQL instalado en tu notebook.
  # - production: MySQL en Railway.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local-h2}

  jackson:
    time-zone: America/Punta_Arenas

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,http://localhost:4300,http://127.0.0.1:4200,https://gestionpresupuestaria-frontend-production.up.railway.app,https://*.up.railway.app,https://*.dssm.cl}
  jwt:
    # En producción, sobreescribir con variable APP_JWT_SECRET.
    secret: ${APP_JWT_SECRET:change_me_with_a_very_long_random_256bit_secret_for_presupuesto_dssm}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:3600000}
  mercado-publico:
    base-url: ${MERCADO_PUBLICO_BASE_URL:https://api.mercadopublico.cl/servicios/v1/publico/ordenesdecompra.json}
    # Para producción institucional, sobreescribir con MERCADO_PUBLICO_TICKET propio de ChileCompra.
    ticket: ${MERCADO_PUBLICO_TICKET:F8537A18-6766-4DEF-9E59-426B4FEE2844}

  ceropapel:
    base-url: ${CERO_PAPEL_BASE_URL:https://ceropapel-integracion-api.dssm.cl/api}
    auth-path: ${CERO_PAPEL_AUTH_PATH:/login}
    purchase-requests-path: ${CERO_PAPEL_PURCHASE_REQUESTS_PATH:/solicitudes-compra}
    rut: ${CERO_PAPEL_RUT:15582517-0}
    password: ${CERO_PAPEL_PASSWORD:Minsal1305$}

springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /api-docs
