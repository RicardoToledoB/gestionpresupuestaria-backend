spring:
  application:
    name: presupuesto-dssm

  # =========================================================
  # PERFIL INICIAL MVP: H2 EN MEMORIA
  # =========================================================
  # Esta configuración permite levantar el backend sin instalar
  # PostgreSQL/MariaDB. Ideal para validar entidades, endpoints,
  # importación del Excel y dashboard ejecutivo.
  datasource:
    url: jdbc:h2:mem:presupuesto_dssm;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: America/Punta_Arenas

  jackson:
    time-zone: America/Punta_Arenas

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

app:
  cors:
    # En Railway puede sobreescribirse con variable de entorno APP_CORS_ALLOWED_ORIGIN_PATTERNS
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,http://localhost:4300,http://127.0.0.1:4200,https://gestionpresupuestaria-frontend-production.up.railway.app,https://*.up.railway.app,https://*.dssm.cl}
  jwt:
    secret: change_me_with_a_very_long_random_256bit_secret_for_presupuesto_dssm
    expiration-ms: 3600000

springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /api-docs

